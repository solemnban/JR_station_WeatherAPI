<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山陽本線 運行シミュレーター (広島エリア)</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #ffffff;
            --line-color: #0054a6; /* JR西日本 青 */
            --delay-color: #ff3333;
            --normal-color: #33cc33;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; font-size: 1.5rem; }
        
        /* コントロールパネル */
        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .time-display {
            font-size: 1.8rem;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            font-weight: bold;
            color: #00ffcc;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        button {
            background-color: var(--line-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .slider-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
        }
        input[type="range"] { flex-grow: 1; cursor: pointer; }
        .status-bar {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 8px;
        }

        /* 路線図表示エリア */
        .canvas-container {
            background-color: #111;
            border-radius: 8px;
            width: 90%;
            max-width: 1000px;
            overflow-x: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <h1>🗺️ 山陽本線 運行可視化モニター</h1>

    <div class="panel">
        <div id="timeDisplay" class="time-display">データ読み込み中...</div>
        <div class="slider-container">
            <input type="range" id="timeSlider" min="0" max="0" value="0" disabled>
        </div>
        <div class="controls">
            <button id="playBtn" disabled>再生</button>
            <span id="speedDisplay">速度: 1秒 = 5分</span>
        </div>
        <div id="statusBar" class="status-bar">CSVログファイルを解析しています...</div>
    </div>

    <div class="canvas-container">
        <canvas id="monitorCanvas" width="1000" height="250"></canvas>
    </div>

    <script>
        // 主要駅の設定（簡略化された路線図上のX座標マッピング）
        const STATIONS = [
            { code: "岩国", name: "岩国", x: 80 },
            { code: "大野浦", name: "大野浦", x: 200 },
            { code: "宮島口", name: "宮島口", x: 300 },
            { code: "五日市", name: "五日市", x: 420 },
            { code: "横川", name: "横川", x: 520 },
            { code: "広島", name: "広島", x: 600 },
            { code: "海田市", name: "海田市", x: 680 },
            { code: "西条", name: "西条", x: 800 },
            { code: "白市", name: "白市", x: 880 },
            { code: "三原", name: "三原", x: 940 }
        ];

        // グローバル状態管理
        let csvRecords = [];
        let timeTimelines = []; // ユニークなタイムスタンプのリスト（とびとび対策）
        let currentTimeIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let animationFrameId = null;
        
        // 滑らかな移動のための変数
        let lastTickTime = performance.now();
        let currentSubProgress = 0.0; // 0.0から1.0まで5分間を補間する進捗

        const canvas = document.getElementById('monitorCanvas');
        const ctx = canvas.getContext('2d');

        // CSVファイルの読み込み
        async function loadCSV() {
            try {
                const response = await fetch('data/train_logs.csv');
                if (!response.ok) throw new Error("ファイルが見つかりません。");
                const text = await response.text();
                parseCSV(text);
            } catch (error) {
                document.getElementById('timeDisplay').innerText = "エラー";
                document.getElementById('statusBar').innerText = "データの読み込みに失敗しました: " + error.message;
            }
        }

        // 簡易CSVパース
        function parseCSV(text) {
            const lines = text.split('\n');
            const uniqueTimes = new Set();
            csvRecords = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',');
                if (cols.length < 7) continue;

                const record = {
                    timestamp: cols[0],
                    train_no: cols[1],
                    station_code: cols[2],
                    direction: parseInt(cols[3]),
                    delay_min: parseInt(cols[4]),
                    congestion: parseInt(cols[5]),
                    delay_cause: cols[6]
                };
                csvRecords.push(record);
                uniqueTimes.add(record.timestamp);
            }

            timeTimelines = Array.from(uniqueTimes).sort();
            
            if (timeTimelines.length === 0) {
                document.getElementById('statusBar').innerText = "CSVに有効なレコードがありません。";
                return;
            }

            // UIの初期化
            const slider = document.getElementById('timeSlider');
            slider.max = timeTimelines.length - 1;
            slider.disabled = false;
            document.getElementById('playBtn').disabled = false;
            document.getElementById('statusBar').innerText = `解析完了: ${csvRecords.length} レコードを取得。`;
            
            updateDisplay();
            requestAnimationFrame(animationLoop);
        }

        // 表示の更新（文字系）
        function updateDisplay() {
            if (timeTimelines.length === 0) return;
            const currentTimestamp = timeTimelines[currentTimeIndex];
            document.getElementById('timeDisplay').innerText = currentTimestamp;
            document.getElementById('timeSlider').value = currentTimeIndex;

            // その瞬間の原因テロップを探す
            const currentRecords = csvRecords.filter(r => r.timestamp === currentTimestamp);
            if (currentRecords.length > 0) {
                const cause = currentRecords.find(r => r.delay_cause !== "平常")?.delay_cause || "平常（順調な運行）";
                document.getElementById('statusBar').innerText = `運行状況: ${cause}`;
            }
        }

        // 描画および補間処理のメインループ
        function animationLoop(timestamp) {
            if (isPlaying) {
                const delta = timestamp - lastTickTime;
                // 1秒(1000ms)で次の5分データへ進む速度設計
                currentSubProgress += delta / 1000; 
                if (currentSubProgress >= 1.0) {
                    currentSubProgress = 0.0;
                    currentTimeIndex++;
                    if (currentTimeIndex >= timeTimelines.length) {
                        currentTimeIndex = 0; // ループ
                    }
                    updateDisplay();
                }
            } else {
                currentSubProgress = 0.0;
            }
            
            lastTickTime = timestamp;

            drawRouteMap();
            animationFrameId = requestAnimationFrame(animationLoop);
        }

        // 路線図と列車の描画
        function drawRouteMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 路線（ベースの青線）を描画
            ctx.strokeStyle = '#0054a6';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(50, 120);
            ctx.lineTo(950, 120);
            ctx.stroke();

            // 2. 駅（ドットと文字）を描画
            STATIONS.forEach(st => {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(st.x, 120, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 駅名
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(st.name, st.x, 150);
            });

            if (timeTimelines.length === 0) return;

            // 3. 列車位置の補間計算と描画
            const nowTime = timeTimelines[currentTimeIndex];
            const nextTime = timeTimelines[(currentTimeIndex + 1) % timeTimelines.length];

            const nowTrains = csvRecords.filter(r => r.timestamp === nowTime);
            const nextTrains = csvRecords.filter(r => r.timestamp === nextTime);

            nowTrains.forEach(train => {
                // 現在の駅のインデックスを取得
                let currentStIdx = STATIONS.findIndex(st => st.code === train.station_code);
                if (currentStIdx === -1) currentStIdx = 5; // 見つからない場合は広島駅をデフォルトに

                let targetX = STATIONS[currentStIdx].x;

                // 再生中かつ、次の5分データに同じ列車番号が存在する場合、位置を滑らかに補間する
                if (isPlaying) {
                    const nextTrainIdx = nextTrains.findIndex(nt => nt.train_no === train.train_no);
                    if (nextTrainIdx !== -1) {
                        let nextStIdx = STATIONS.findIndex(st => st.code === nextTrains[nextTrainIdx].station_code);
                        if (nextStIdx !== -1) {
                            const startX = STATIONS[currentStIdx].x;
                            const endX = STATIONS[nextStIdx].x;
                            // 線形補間（Lerp）数式
                            targetX = startX + (endX - startX) * currentSubProgress;
                        }
                    }
                }

                // 上り（direction=1/右進む）と下り（direction=2/左進む）でY軸をずらす
                const targetY = train.direction === 1 ? 100 : 140;

                // 遅延判定による色の切り替え
                const isDelayed = train.delay_min > 0;
                ctx.fillStyle = isDelayed ? `rgb(255, ${Math.floor(50 + Math.sin(Date.now()/100)*50)}, 50)` : '#33cc33';

                // 列車アイコン（小さな三角矢印）
                ctx.beginPath();
                if (train.direction === 1) { // 右向き三角
                    ctx.moveTo(targetX - 8, targetY - 6);
                    ctx.lineTo(targetX + 8, targetY);
                    ctx.lineTo(targetX - 8, targetY + 6);
                } else { // 左向き三角
                    ctx.moveTo(targetX + 8, targetY - 6);
                    ctx.lineTo(targetX - 8, targetY);
                    ctx.lineTo(targetX + 8, targetY + 6);
                }
                ctx.fill();

                // 列車番号のテキスト表示
                ctx.fillStyle = '#ffffff';
                ctx.font = '10px sans-serif';
                ctx.fillText(train.train_no, targetX, targetY - 12);

                // 遅延がある場合は「+〇分」を赤文字で強調
                if (isDelayed) {
                    ctx.fillStyle = '#ff3333';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.fillText(`+${train.delay_min}分`, targetX, targetY + 16);
                }
            });
        }

        // イベントリスナーの設定
        document.getElementById('playBtn').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.innerText = isPlaying ? "一時停止" : "再生";
            if (isPlaying) lastTickTime = performance.now();
        });

        document.getElementById('timeSlider').addEventListener('input', function() {
            isPlaying = false;
            document.getElementById('playBtn').innerText = "再生";
            currentTimeIndex = parseInt(this.value);
            updateDisplay();
        });

        // 起動時に読み込み開始
        window.onload = loadCSV;
    </script>
</body>
</html>
